name: input_token_limit
package: server
function: (*Server).WithSafety (MaxInputTokens)
description: |
  When `approxTokens = len(req.Text) / 4` exceeds safety.MaxInputTokens
  on a CHAT message, serveConn replies with a CHAT message (not ERROR)
  carrying the fixed text "Please keep your message shorter — I work
  best with concise questions." Note: this is a friendly-looking
  response but generated by the server, not from a ResponseNode.

  Here we cap at 2 tokens (=8 bytes of text). Sending 10 bytes of text
  (approxTokens = 2) does NOT trip; sending 12 bytes (approxTokens = 3)
  does.
trl: |
  SERVICE Server SHALL REJECT DATA IF INTEGER approxTokens EXCEEDS INTEGER MaxInputTokens
  THEN SEND RECORD Message 'with STRING "Please keep your message shorter — I work best with concise questions." AS payload.text.
harness:
  chat_handler: echo
  max_input_tokens: 2
  max_input_bytes: 10000   # ensure byte limit doesn't trip first
interactions:
  - send:
      type: CHAT
      payload: {text: "abcdefghij"}   # 10 bytes = 2 tokens — under limit
      id: msg-tok-pass
    expect:
      type: CHAT
      payload_text_exact: "You said: abcdefghij"
      reply_to: msg-tok-pass
  - send:
      type: CHAT
      payload: {text: "abcdefghijkl"}  # 12 bytes = 3 tokens — over 2-token limit
      id: msg-tok-over
    expect:
      type: CHAT
      payload_text_exact: "Please keep your message shorter — I work best with concise questions."
      reply_to: msg-tok-over
