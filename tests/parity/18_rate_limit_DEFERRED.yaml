name: rate_limit
package: server
function: (*Server).WithSafety (RateLimit)
description: |
  serveConn maintains a per-connection sliding 1-minute window of
  message timestamps. If the number of timestamps within the last 60
  seconds exceeds safety.RateLimit, the server replies with an ERROR
  Message {"error": "rate limit exceeded, please slow down"} and
  continues the loop.

  Exercising this in parity requires either:
    (a) sending RateLimit+1 messages within the 1-minute window (slow
        and noisy), or
    (b) patching the 60-second constant to something test-friendly.

  The 60-second constant is hard-coded in server.go:581
  (`cutoff := now.Add(-1 * time.Minute)`); no builder exposes it. The
  Go test suite's TestRateLimit sets RateLimit=2 and bangs 4 messages
  in a row, which works because all 4 land inside the same minute.
  That approach is reproducible here, but adds ~60s of real time if
  we wanted to also verify the window-slide behaviour.
trl: |
  SERVICE Server SHALL REJECT DATA IF INTEGER rate EXCEEDS INTEGER RateLimit WITHIN 60
  THEN SEND RECORD Message 'with STRING "rate limit exceeded, please slow down" AS payload.error.
skip: true
skip_reason: |
  DEFERRED to a follow-up fixture set. The immediate-rate-exceeded case
  is runnable (send RateLimit+1 messages in a tight loop). The
  window-slide case is not (would require Go code surgery or 60s of
  wall time). Implementable in v1.1 of the parity corpus without
  changes to the harness.
